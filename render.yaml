services:
  - type: web
    name: wsep-app
    runtime: python
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: pip install fastapi uvicorn requests pydantic aiofiles && cd backend && python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

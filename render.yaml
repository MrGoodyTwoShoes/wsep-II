services:
  - type: web
    name: wsep-app
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npm run build
    startCommand: bash -c "cd backend && python -m uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
